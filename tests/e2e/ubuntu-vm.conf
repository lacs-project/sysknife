# ubuntu-vm.conf — defaults for the Ubuntu LTS E2E VMs.
# Sourced by ubuntu-vm.sh. Override by setting env vars before calling
# ubuntu-vm.sh, or by editing this file in your worktree.
#
# UBUNTU_RELEASE selects the Ubuntu LTS to run against.
# Accepted values: jammy (22.04), noble (24.04), resolute (26.04).
# Default: noble (preserves the historical single-VM workflow).
UBUNTU_RELEASE="${UBUNTU_RELEASE:-noble}"

# Validate the release and apply per-release settings.
# SSH ports are assigned so all three VMs can run simultaneously:
#   jammy    → 2222
#   noble    → 2223  (historical default, unchanged)
#   resolute → 2224
case "$UBUNTU_RELEASE" in
  jammy)
    _DEFAULT_SSH_PORT=2222
    _DEFAULT_BASE_IMAGE="jammy-server-cloudimg-amd64.img"
    _DEFAULT_CLOUD_IMG_URL="https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
    ;;
  noble)
    _DEFAULT_SSH_PORT=2223
    _DEFAULT_BASE_IMAGE="noble-server-cloudimg-amd64.img"
    _DEFAULT_CLOUD_IMG_URL="https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    ;;
  resolute)
    _DEFAULT_SSH_PORT=2224
    _DEFAULT_BASE_IMAGE="resolute-server-cloudimg-amd64.img"
    _DEFAULT_CLOUD_IMG_URL="https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img"
    ;;
  *)
    echo "ubuntu-vm.conf: unsupported release: $UBUNTU_RELEASE (accepted: jammy, noble, resolute)" >&2
    exit 1
    ;;
esac

# RAM allocated to the guest. 4 GB is enough for apt builds + sysknife.
# Bump to 8G if you plan to run a local LLM inside the VM.
UBUNTU_VM_MEM="${UBUNTU_VM_MEM:-4096}"

# Virtual CPU count. 2 keeps the host responsive; 4 speeds up cargo.
UBUNTU_VM_CPUS="${UBUNTU_VM_CPUS:-2}"

# qcow2 overlay size (virtual disk visible to the guest).
UBUNTU_VM_DISK="${UBUNTU_VM_DISK:-20G}"

# Host SSH port forwarded to guest :22. Per-release defaults above ensure
# all three VMs can be up at the same time without port clashes.
UBUNTU_VM_SSH_PORT="${UBUNTU_VM_SSH_PORT:-$_DEFAULT_SSH_PORT}"

# Guest username — matches the default user baked into Ubuntu cloud images.
UBUNTU_VM_USER="${UBUNTU_VM_USER:-ubuntu}"

# Where to cache the base cloud image.
UBUNTU_VM_IMAGE_CACHE="${UBUNTU_VM_IMAGE_CACHE:-$HOME/.cache/sysknife-vms}"

# Image filename inside the cache dir (per-release default above).
UBUNTU_VM_BASE_IMAGE="${UBUNTU_VM_BASE_IMAGE:-$_DEFAULT_BASE_IMAGE}"

# Download URL for the base image (per-release default above).
UBUNTU_CLOUD_IMG_URL="${UBUNTU_CLOUD_IMG_URL:-$_DEFAULT_CLOUD_IMG_URL}"

# Where to store the overlay and VM runtime files (per-release subdirectory).
UBUNTU_VM_DIR="${UBUNTU_VM_DIR:-tests/e2e/ubuntu-vm/${UBUNTU_RELEASE}}"
