---
name: release-rehearsal

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rehearse:
    name: Rehearse ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake file

      - name: Run non-publishing release rehearsal
        run: scripts/release_rehearsal.sh --full --output dist

      - name: Upload rehearsal artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: release-rehearsal-${{ matrix.arch }}
          path: dist/
          retention-days: 3
