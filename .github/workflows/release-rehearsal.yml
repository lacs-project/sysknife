---
name: release-rehearsal

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-rehearsal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rehearse:
    name: Rehearse ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake file

      - name: Run non-publishing release rehearsal
        run: scripts/release_rehearsal.sh --full --output dist

      - name: Upload rehearsal artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-rehearsal-${{ matrix.arch }}
          path: dist/
          retention-days: 3
