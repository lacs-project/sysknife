---
# Release workflow for SysKnife.
#
# Triggered by pushing a version tag (v*.*.*).
# Builds sysknife and sysknife-daemon for Linux x86_64 and aarch64,
# then creates a GitHub release with the binaries as assets.
#
# Binary naming convention:
#   sysknife-v0.1.0-linux-x86_64
#   sysknife-daemon-v0.1.0-linux-x86_64
#   sysknife-v0.1.0-linux-aarch64
#   sysknife-daemon-v0.1.0-linux-aarch64

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

# Group per tag so distinct release tags never cancel each other, and never
# cancel a release mid-flight (a half-uploaded release leaves a broken tag).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate tag and package versions
        run: bash scripts/check_release_versions.sh "${{ github.ref_name }}"

      - name: Require publication credentials
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "${CARGO_REGISTRY_TOKEN:-}" || { echo '::error::CARGO_REGISTRY_TOKEN is not configured'; exit 1; }

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            -p sysknife-cli \
            -p sysknife-daemon

      - name: Rename and stage binaries
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp target/release/sysknife        "sysknife-${VERSION}-linux-${ARCH}"
          cp target/release/sysknife-daemon "sysknife-daemon-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-daemon-${VERSION}-linux-${ARCH}"
          sha256sum \
            "sysknife-${VERSION}-linux-${ARCH}" \
            "sysknife-daemon-${VERSION}-linux-${ARCH}" \
            > "sha256sums-linux-${ARCH}.txt"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}
            sysknife-daemon-${{ github.ref_name }}-linux-${{ matrix.arch }}

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}
            sysknife-daemon-${{ github.ref_name }}-linux-${{ matrix.arch }}
          sbom-path: sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            sysknife-*-linux-${{ matrix.arch }}
            sysknife-daemon-*-linux-${{ matrix.arch }}
            sha256sums-linux-${{ matrix.arch }}.txt
            sysknife-*-linux-${{ matrix.arch }}.spdx.json
          retention-days: 1

  publish-npm:
    name: Publish sysknife-setup to npm
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Smoke-test the package
        run: node packages/setup/index.js --help

      - name: Publish to npm
        run: |
          cd packages/setup
          npm publish --access public

  publish-crates:
    name: Publish to crates.io
    needs: [preflight, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      - name: Publish in dependency order
        # Publish order follows the internal dependency graph:
        #   proto + core -> types -> brain -> daemon -> cli
        # --no-verify skips the redundant pre-publish rebuild; the build job
        # already verified the workspace compiles cleanly.
        # sleep 30 lets crates.io index each crate before its dependents publish.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "${CARGO_REGISTRY_TOKEN:-}" || { echo '::error::CARGO_REGISTRY_TOKEN is not configured'; exit 1; }
          for crate in sysknife-proto sysknife-core sysknife-types \
                       sysknife-brain sysknife-daemon; do
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" --no-verify
            sleep 30
          done
          cargo publish -p sysknife-cli --token "$CARGO_REGISTRY_TOKEN" --no-verify

  release:
    name: Create GitHub release
    needs: [build, publish-npm, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create/upload

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist/

      - name: List dist contents
        run: ls -lh dist/

      - name: Create GitHub release (metadata only)
        # Split create from upload: a single gh release create with assets
        # that fails partway deletes the release object, which then 404s on
        # subsequent uploads (observed on v0.2.0). Two-phase avoids the race.
        # All env vars are server-controlled (github.ref_name = tag name,
        # github.repository = static repo path) — no user input is shelled.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "$VERSION" \
            --generate-notes

      - name: Upload release assets
        # `dist/sysknife-*-linux-x86_64` matches BOTH `sysknife-v…-x86_64`
        # AND `sysknife-daemon-v…-x86_64` (the latter starts with the same
        # prefix). Listing `sysknife-daemon-*` separately on the same line
        # produces a duplicate file argument that breaks `gh release upload`.
        # Enumerate explicit paths instead — no globs, no duplicates.
        # --clobber allows the workflow to be re-run on the same tag.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$VERSION" \
            --repo "$REPO" \
            --clobber \
            "dist/sysknife-${VERSION}-linux-x86_64" \
            "dist/sysknife-daemon-${VERSION}-linux-x86_64" \
            "dist/sysknife-${VERSION}-linux-aarch64" \
            "dist/sysknife-daemon-${VERSION}-linux-aarch64" \
            "dist/sha256sums-linux-x86_64.txt" \
            "dist/sha256sums-linux-aarch64.txt" \
            "dist/sysknife-${VERSION}-linux-x86_64.spdx.json" \
            "dist/sysknife-${VERSION}-linux-aarch64.spdx.json"
