---
# Release workflow for SysKnife.
#
# Triggered by pushing a version tag (v*.*.*).
# Builds sysknife and sysknife-daemon for Linux x86_64 and aarch64,
# then creates a GitHub release with the binaries as assets.
#
# Binary naming convention:
#   sysknife-v0.1.0-linux-x86_64
#   sysknife-daemon-v0.1.0-linux-x86_64
#   sysknife-v0.1.0-linux-aarch64
#   sysknife-daemon-v0.1.0-linux-aarch64

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

# Group per tag so distinct release tags never cancel each other, and never
# cancel a release mid-flight (a half-uploaded release leaves a broken tag).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: '20'

      - name: Validate tag and package versions
        run: bash scripts/check_release_versions.sh "${{ github.ref_name }}"

      - name: Check registry state for resumable publishing
        run: bash scripts/check_registry_versions.sh "${{ github.ref_name }}"

      - name: Require publication credentials
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          test -n "${CARGO_REGISTRY_TOKEN:-}" || { echo '::error::CARGO_REGISTRY_TOKEN is not configured'; exit 1; }

  build:
    name: Build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            -p sysknife-cli \
            -p sysknife-daemon

      - name: Rename and stage binaries
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp target/release/sysknife        "sysknife-${VERSION}-linux-${ARCH}"
          cp target/release/sysknife-daemon "sysknife-daemon-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-${VERSION}-linux-${ARCH}"
          chmod +x "sysknife-daemon-${VERSION}-linux-${ARCH}"
          sha256sum \
            "sysknife-${VERSION}-linux-${ARCH}" \
            "sysknife-daemon-${VERSION}-linux-${ARCH}" \
            > "sha256sums-linux-${ARCH}.txt"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          path: .
          format: spdx-json
          output-file: sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4
        with:
          subject-path: |
            sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}
            sysknife-daemon-${{ github.ref_name }}-linux-${{ matrix.arch }}

      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4
        with:
          subject-path: |
            sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}
            sysknife-daemon-${{ github.ref_name }}-linux-${{ matrix.arch }}
          sbom-path: sysknife-${{ github.ref_name }}-linux-${{ matrix.arch }}.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            sysknife-*-linux-${{ matrix.arch }}
            sysknife-daemon-*-linux-${{ matrix.arch }}
            sha256sums-linux-${{ matrix.arch }}.txt
            sysknife-*-linux-${{ matrix.arch }}.spdx.json
          retention-days: 1

  publish-npm:
    name: Publish sysknife-setup to npm
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Smoke-test the package
        run: npm test --prefix packages/setup

      - name: Publish to npm
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if curl --fail --silent --retry 3 --retry-connrefused \
            "https://registry.npmjs.org/sysknife-setup/${VERSION}" >/dev/null; then
            echo "sysknife-setup ${VERSION} already exists; skipping"
          else
            cd packages/setup
            npm publish --access public
          fi

  publish-crates:
    name: Publish to crates.io
    needs: [preflight, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake

      - name: Publish in dependency order
        # Publish order follows the internal dependency graph:
        #   proto + core -> types -> brain -> daemon -> cli
        # Every generated crate archive is verified before upload. Existing
        # versions are skipped so a partially completed release can be resumed.
        # sleep 30 lets crates.io index each crate before its dependents publish.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          test -n "${CARGO_REGISTRY_TOKEN:-}" || { echo '::error::CARGO_REGISTRY_TOKEN is not configured'; exit 1; }
          VERSION="${VERSION#v}"
          for crate in sysknife-proto sysknife-core sysknife-types \
                       sysknife-brain sysknife-daemon sysknife-cli; do
            if curl --fail --silent --retry 3 --retry-connrefused \
              --user-agent 'sysknife-release/1.0 (https://github.com/lacs-project/sysknife)' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" >/dev/null; then
              echo "${crate} ${VERSION} already exists; skipping"
            else
              cargo publish -p "$crate" --locked --token "$CARGO_REGISTRY_TOKEN"
              sleep 30
            fi
          done

  release:
    name: Create GitHub release
    needs: [build, publish-npm, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create/upload

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          merge-multiple: true
          path: dist/

      - name: List dist contents
        run: ls -lh dist/

      - name: Create GitHub release (metadata only)
        # Split create from upload: a single gh release create with assets
        # that fails partway deletes the release object, which then 404s on
        # subsequent uploads (observed on v0.2.0). Two-phase avoids the race.
        # All env vars are server-controlled (github.ref_name = tag name,
        # github.repository = static repo path) — no user input is shelled.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "$VERSION" \
            --generate-notes

      - name: Upload release assets
        # `dist/sysknife-*-linux-x86_64` matches BOTH `sysknife-v…-x86_64`
        # AND `sysknife-daemon-v…-x86_64` (the latter starts with the same
        # prefix). Listing `sysknife-daemon-*` separately on the same line
        # produces a duplicate file argument that breaks `gh release upload`.
        # Enumerate explicit paths instead — no globs, no duplicates.
        # --clobber allows the workflow to be re-run on the same tag.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$VERSION" \
            --repo "$REPO" \
            --clobber \
            "dist/sysknife-${VERSION}-linux-x86_64" \
            "dist/sysknife-daemon-${VERSION}-linux-x86_64" \
            "dist/sysknife-${VERSION}-linux-aarch64" \
            "dist/sysknife-daemon-${VERSION}-linux-aarch64" \
            "dist/sha256sums-linux-x86_64.txt" \
            "dist/sha256sums-linux-aarch64.txt" \
            "dist/sysknife-${VERSION}-linux-x86_64.spdx.json" \
            "dist/sysknife-${VERSION}-linux-aarch64.spdx.json"
