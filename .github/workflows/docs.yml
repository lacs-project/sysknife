name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # GitHub Pages is only enabled while the repo is public; the deploy step
    # 404s otherwise. Gate the whole workflow on visibility (same pattern as
    # codeql.yml / ci.yml) so it stays green — not red — while the repo is
    # private, and resumes automatically on the public flip.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Install mdBook and plugins
        env:
          MDBOOK_VERSION: "0.4.40"
          MDBOOK_ADMONISH_VERSION: "1.18.0"
          # sha256 of the x86_64-unknown-linux-gnu release tarballs, verified on
          # download so a swapped or compromised release asset fails the build
          # instead of being piped straight into tar. Bump in lockstep with the
          # versions above (recompute with `sha256sum` on the downloaded tarball).
          MDBOOK_SHA256: "9ef07fd288ba58ff3b99d1c94e6d414d431c9a61fdb20348e5beb74b823d546b"
          MDBOOK_ADMONISH_SHA256: "5d19ec6376c646204235f197c91398cf95873e96e6100982137112056da96fe4"
        run: |
          set -euo pipefail
          curl -sSfL -o mdbook.tar.gz \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_SHA256}  mdbook.tar.gz" | sha256sum --check --strict -
          tar -xzf mdbook.tar.gz --directory /usr/local/bin
          curl -sSfL -o mdbook-admonish.tar.gz \
            "https://github.com/tommilligan/mdbook-admonish/releases/download/v${MDBOOK_ADMONISH_VERSION}/mdbook-admonish-v${MDBOOK_ADMONISH_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_ADMONISH_SHA256}  mdbook-admonish.tar.gz" | sha256sum --check --strict -
          tar -xzf mdbook-admonish.tar.gz --directory /usr/local/bin

      - name: Build docs
        run: |
          mdbook-admonish install .
          mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: book

  deploy:
    if: github.event.repository.visibility == 'public'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
