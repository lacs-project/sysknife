---
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (saves runner minutes). Pushes to
# main are never cancelled mid-flight; only PR iterations supersede each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs-and-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          npm install --global markdownlint-cli2 markdown-link-check
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Check required repository files
        run: bash scripts/check_repo_completeness.sh

      - name: Check release version consistency
        run: bash scripts/check_release_versions.sh

      - name: Check public support and approval claims
        run: bash tests/release/public-claims.test.sh

      - name: Test setup package contracts
        run: npm test --prefix packages/setup

      - name: Check release rehearsal contract
        run: bash tests/release/release-rehearsal.test.sh

      - name: Check Ubuntu VM bootstrap contract
        run: bash tests/e2e/ubuntu-vm-bootstrap.test.sh

      - name: Lint markdown
        run: |
          markdownlint-cli2 \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            ROADMAP.md \
            docs/architecture.md \
            docs/developer-guide.md \
            docs/adr/*.md

      - name: Check markdown links
        run: |
          for file in \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            ROADMAP.md \
            docs/architecture.md \
            docs/developer-guide.md \
            docs/adr/0001-system-boundaries.md \
            docs/adr/0002-brain-provider-layer.md \
            docs/adr/0003-ipc-wire-protocol.md
          do
            markdown-link-check --config .markdown-link-check.json "$file"
          done

      - name: Lint GitHub issue templates
        run: yamllint .github/ISSUE_TEMPLATE/*.yml .github/workflows/*.yml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/sysknife-shell
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Test
        run: ./node_modules/.bin/vitest run

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_HOME: /home/runner/.cargo
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-features --locked -- -D warnings

      - name: Doc check (broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --workspace --locked

      - name: Install cargo-nextest
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2
        with:
          tool: cargo-nextest

      - name: Test workspace
        run: cargo nextest run --workspace --locked

  postgres-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sysknife
          POSTGRES_PASSWORD: sysknife
          POSTGRES_DB: sysknife_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sysknife -d sysknife_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SYSKNIFE_TEST_POSTGRES_URL: >-
        postgres://sysknife:sysknife@127.0.0.1:5432/sysknife_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Run live Postgres migration and store contract
        run: cargo test -p sysknife-daemon --test postgres_store --locked

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2
        with:
          tool: cargo-audit

      - name: Audit dependencies for known RustSec advisories
        # Fails the build on any unignored vulnerability. Unmaintained-crate
        # warnings are reported but non-fatal (default cargo-audit behaviour).
        #
        # RUSTSEC-2026-0097 (rand 0.7.3) is ignored: it is pulled transitively
        # only by the Tauri desktop shell's webview deps (kuchikiki/selectors),
        # is not reachable from the privileged daemon, brain, or CLI, and has
        # no fixed upstream release yet. Re-evaluate when Tauri bumps the chain.
        #
        # The accepted unmaintained/unsound advisories (all GUI-transitive) are
        # catalogued in docs/security/audit-advisories.md.
        run: cargo audit --ignore RUSTSEC-2026-0097

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
