---
name: secret-scan

# Scans pull requests for committed credentials. Uses TruffleHog in
# verified-only mode: the gate fires solely on secrets that still authenticate
# against their provider, so it cannot be tripped by inert example strings or a
# rotated key. Scoped to the PR commit range (base..head) so it never re-scans
# deep history (any historical leak must be handled by rotation, not this gate).

on:
  pull_request:
  schedule:
    - cron: '0 7 * * 1'  # weekly full working-tree sweep

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0  # full clone so the base..head range resolves

      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@8708801319700a16c56abb86628803ba766d5563  # main
        with:
          # PR: scan base -> head. Schedule: omit range -> scan working tree.
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          # The action injects --fail itself; passing it again in extra_args
          # errors with "flag 'fail' cannot be repeated". Keep only the filter.
          extra_args: --results=verified
