# sysusers.d(5) — create the sysknife system user, socket group, and role groups.
#
# Deploy to: /usr/lib/sysusers.d/sysknife.conf
# Applied by: systemd-sysusers (runs at boot and after package install).
#
# The lacs system user (daemon identity):
#   - No login shell — daemon-only account.
#   - No home directory — state lives in /var/lib/sysknife.
#   - Owns the socket directory /run/sysknife and the socket itself.
u sysknife - "SysKnife privileged daemon" /var/lib/sysknife /usr/sbin/nologin

# Socket-gating group — controls access to /run/sysknife/.
#
# The daemon socket directory /run/sysknife/ is owned sysknife:sysknife 0750.
# A user must be in the sysknife group to reach the socket at all; without it
# the connection is refused before any role check happens.
#
# This group is separate from the role groups so that socket-level access
# and capability-level access can be managed independently.
g sysknife - -

# Role groups — map to CallerRole in crates/sysknife-daemon/src/auth.rs.
#
# To grant a user access to SysKnife, add them to the sysknife group (required to
# reach the socket) and to exactly one role group (determines what they
# can do once connected):
#
#   sudo usermod -aG sysknife,sysknife-dev alice    # read + medium-risk mutations
#   sudo usermod -aG sysknife,sysknife-admin alice  # full access incl. rpm-ostree
#
# Role hierarchy (higher role wins when a user is in multiple groups):
#
#   sysknife-observer  — read-only queries (GetDiskUsage, ListServices, …)
#   sysknife-dev       — observer + medium-risk mutations (services, containers, SSH keys, …)
#   sysknife-admin     — dev + high-risk mutations (rpm-ostree, reboot, kernel args, …)
#   sysknife-boot      — reserved for boot-time automation; grants all actions
#
# Members of the wheel group are treated as sysknife-admin automatically.
# No explicit sysknife-admin membership is required for wheel users.
g sysknife-observer - -
g sysknife-dev      - -
g sysknife-admin    - -
g sysknife-boot     - -

# systemd-journal membership — allows `journalctl` without --system flag.
# Required for GetServiceLogs (journalctl -u <unit>) to read the journal
# as the sysknife daemon user instead of a session user.
m sysknife systemd-journal
