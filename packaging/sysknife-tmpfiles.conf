# tmpfiles.d(5) — create runtime and state directories for sysknife.
#
# Deploy to: /usr/lib/tmpfiles.d/sysknife.conf
# Applied by: systemd-tmpfiles-setup (boot) and systemd-tmpfiles-clean.
#
# Columns: Type  Path              Mode  User  Group  Age  Argument
#
# /run/sysknife      — volatile runtime dir (wiped at reboot); holds daemon.sock.
# /var/lib/sysknife  — persistent state dir; holds daemon.sqlite.

d /run/sysknife     0750 sysknife sysknife -
d /var/lib/sysknife 0700 sysknife sysknife -
